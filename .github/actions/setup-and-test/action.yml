name: 'Setup and Test'
description: 'Set up Node, cache deps, install, and run tests'
branding:
  icon: 'check'
  color: 'green'

inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '20'
  run-tests:
    description: 'Whether to run npm test after install'
    required: false
    default: 'true'

outputs:
  cache-hit:
    description: 'Whether dependencies were restored from cache'
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - id: cache
      uses: actions/cache@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ inputs.node-version }}-${{ hashFiles('**/package-lock.json', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-node-${{ inputs.node-version }}-

    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

    - name: Run tests
      if: inputs.run-tests == 'true'
      shell: bash
      run: npm test
